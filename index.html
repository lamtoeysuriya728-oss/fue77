<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>⛽ ปั้มไหนมี — เขมราฐ นาตาล ตระการ โพธิ์ไทร</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090f;--surface:#111119;--surface2:#1a1a27;
  --border:#252538;--border2:#2e2e48;
  --text:#f0f0fa;--text2:#8888aa;--text3:#44445a;
  --accent:#7c6af7;--accent2:#a89dff;
  --green:#22d474;--yellow:#f5b731;--red:#f74444;--blue:#38c8f5;
  --bnav-h:64px;
}
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text)}
#wrap{height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative}
#map{flex:1;min-height:0;width:100%}

/* ══ SPLASH LOADING SCREEN ══ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{
  width:88px;height:88px;border-radius:26px;
  background:linear-gradient(135deg,var(--accent),#4a3fc0);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;margin-bottom:24px;
  box-shadow:0 0 60px rgba(124,106,247,.5),0 0 120px rgba(124,106,247,.2);
  animation:splashPulse 1.8s ease-in-out infinite;
}
@keyframes splashPulse{
  0%,100%{box-shadow:0 0 60px rgba(124,106,247,.5),0 0 120px rgba(124,106,247,.2);}
  50%{box-shadow:0 0 90px rgba(124,106,247,.8),0 0 160px rgba(124,106,247,.3);}
}
.splash-title{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
.splash-sub{font-size:12px;color:var(--text2);margin-bottom:44px;letter-spacing:.3px}
.splash-bar-wrap{width:220px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:16px}
.splash-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;width:0%;transition:width .4s ease;animation:splashLoad 2.2s ease-in-out forwards}
@keyframes splashLoad{
  0%{width:0%} 30%{width:45%} 60%{width:72%} 85%{width:88%} 100%{width:98%}
}
.splash-msg{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.5px;min-height:18px;text-align:center}
.splash-dots{display:inline-flex;gap:5px;margin-top:32px}
.splash-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.splash-dot:nth-child(1){animation:dotPop .9s .0s ease-in-out infinite}
.splash-dot:nth-child(2){animation:dotPop .9s .2s ease-in-out infinite}
.splash-dot:nth-child(3){animation:dotPop .9s .4s ease-in-out infinite}
@keyframes dotPop{0%,100%{transform:scale(1);background:var(--border2)}
  50%{transform:scale(1.5);background:var(--accent)}}

/* ══ TOP BAR ══ */
#top{position:absolute;top:0;left:0;right:0;z-index:500;padding:12px 14px 10px;
  background:linear-gradient(180deg,rgba(9,9,15,.96) 55%,transparent);pointer-events:none}
#top>*{pointer-events:auto}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.logo-icon{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#4a3fc0);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;box-shadow:0 0 16px rgba(124,106,247,.35)}
.logo-text{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--text2);margin-top:1px}
.last-sync{font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;
  margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.loading{background:var(--yellow);animation:blink 1s infinite}
.sync-dot.error{background:var(--red)}

#pills{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
#pills::-webkit-scrollbar{display:none}
.pl{border:1px solid var(--border2);cursor:pointer;padding:5px 12px;border-radius:20px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:11px;font-weight:600;color:var(--text2);
  background:rgba(26,26,39,.85);backdrop-filter:blur(8px);
  transition:all .18s;white-space:nowrap;flex-shrink:0}
.pl.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 12px rgba(124,106,247,.4)}

/* ══ STATS BAR ══ */
#sbar{background:var(--surface);border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0;position:relative;z-index:10}
.sc{padding:9px 4px;text-align:center;border-right:1px solid var(--border)}
.sc:last-child{border-right:none}
.sn{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;line-height:1}
.sl{font-size:9px;color:var(--text2);margin-top:3px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}

/* ══ BOTTOM NAV ══ */
#bnav{
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;
  min-height:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  position:relative;z-index:20;
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:none;
  font-family:'IBM Plex Sans Thai',sans-serif;color:var(--text3);
  transition:color .15s;padding:0 2px;min-width:0;
  align-self:flex-start;height:var(--bnav-h);}
.ni.on{color:var(--accent)}
.ni span{font-size:20px;line-height:1;display:block}
.ni p{font-size:8px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
#brep{flex:1.4;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;padding:0 4px;
  align-self:flex-start;height:var(--bnav-h);}
.brep-i{background:linear-gradient(135deg,var(--accent),#4a3fc0);
  border-radius:18px;padding:7px 10px;display:flex;align-items:center;gap:4px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:11px;color:white;
  box-shadow:0 4px 16px rgba(124,106,247,.45);margin-top:-10px;
  border:1px solid rgba(255,255,255,.12);white-space:nowrap;}

/* ══ OVERLAYS ══ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;
  align-items:flex-end;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.sh{background:var(--surface);border-radius:22px 22px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-height:90vh;overflow-y:auto;padding:12px 16px 34px}
.hdl{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sht{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px}

/* ══ POPUP ══ */
.leaflet-popup-content-wrapper{border-radius:16px!important;
  box-shadow:0 8px 32px rgba(0,0,0,.5)!important;padding:0!important;overflow:hidden;
  background:var(--surface2)!important;border:1px solid var(--border2)!important}
.leaflet-popup-content{margin:0!important;width:268px!important}
.leaflet-popup-tip-container{display:none}
.pp{padding:14px}
.pp-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pp-logo{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border2);
  background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pp-logo img{width:40px;height:40px;object-fit:contain;border-radius:8px}
.pp-name{font-weight:700;font-size:13px;color:var(--text);line-height:1.3}
.pp-dist{font-size:11px;color:var(--text2);margin-top:2px}
.pp-fuels{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.pp-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 9px;border-radius:9px;border:1px solid transparent}
.pp-fn{font-weight:600;font-size:11px;color:var(--text2)}
.pp-bd{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px}

/* หมายเหตุถาวร — แสดงตลอดจนกว่าแอดมินจะเปลี่ยน */
.pp-note{
  font-size:11px;color:var(--yellow);background:rgba(245,183,49,.08);
  border:1px solid rgba(245,183,49,.25);border-radius:9px;
  padding:7px 10px;margin-bottom:10px;line-height:1.5;
  display:flex;align-items:flex-start;gap:6px;
}
.pp-note-icon{flex-shrink:0;margin-top:1px}

.pp-ft{display:flex;align-items:center;gap:6px}
.pp-time{font-size:10px;color:var(--text3);flex:1;font-family:'Space Mono',monospace}
.pp-btn{padding:6px 11px;border-radius:8px;font-size:11px;font-weight:700;
  border:none;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;
  text-decoration:none;display:inline-block;transition:.15s}

/* ══ FORMS ══ */
.ig{margin-bottom:13px}
.il{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;
  font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.inp{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
select.inp option{background:var(--surface2)}
.btn{background:linear-gradient(135deg,var(--accent),#4a3fc0);color:white;border:none;
  cursor:pointer;padding:12px;border-radius:10px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;font-weight:700;
  width:100%;transition:.15s;box-shadow:0 4px 14px rgba(124,106,247,.3)}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fp{display:flex;gap:6px;flex-wrap:wrap}
.fpl{border:1px solid var(--border2);cursor:pointer;padding:6px 12px;border-radius:20px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;font-weight:600;
  background:var(--bg);color:var(--text2);transition:.15s}
.fpl.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.sbtn{padding:12px 4px;border-radius:10px;border:1.5px solid var(--border2);
  background:var(--bg);cursor:pointer;text-align:center;transition:.2s}

/* ══ TOAST ══ */
#toast{position:fixed;bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 22px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:30px;
  font-size:13px;font-weight:600;z-index:9000;opacity:0;transition:.3s;
  pointer-events:none;white-space:nowrap;border:1px solid var(--border2);
  box-shadow:0 4px 24px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ TABS ══ */
.tbr{border-bottom:1px solid var(--border);margin-bottom:13px;display:flex;overflow-x:auto;scrollbar-width:none}
.tbr::-webkit-scrollbar{display:none}
.tb{background:none;border:none;cursor:pointer;padding:9px 11px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:11px;font-weight:600;
  border-bottom:2px solid transparent;color:var(--text2);transition:.15s;white-space:nowrap}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.rc{background:var(--bg);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:8px}
.stag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
  letter-spacing:.3px;text-transform:uppercase;flex-shrink:0}

/* ══ DONATE ══ */
.donate-qr-box{width:200px;height:200px;border-radius:18px;background:white;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;overflow:hidden;border:3px solid var(--border2);
  box-shadow:0 4px 20px rgba(0,0,0,.3)}
.donate-qr-box img{width:194px;height:194px;object-fit:contain}
.donate-name{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;
  color:var(--yellow);text-align:center;margin-bottom:4px}
.donate-msg{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;
  padding:14px;font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;white-space:pre-wrap}

/* ══ SPINNER ══ */
.spin-s{display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ ERROR BAR ══ */
#errBar{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#3a0d0d;color:#fca5a5;font-size:12px;font-weight:600;
  padding:7px 14px;text-align:center;font-family:'IBM Plex Sans Thai',sans-serif;
  border-bottom:1px solid #7f1d1d}

/* ══ MISC ══ */
.saving-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--yellow);margin-right:5px;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.user-dot{width:18px;height:18px;border-radius:50%;background:var(--accent);
  border:3px solid #fff;box-shadow:0 0 0 4px rgba(124,106,247,.3),0 3px 10px rgba(0,0,0,.5);
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(124,106,247,.3),0 3px 10px rgba(0,0,0,.5)}
  50%{box-shadow:0 0 0 8px rgba(124,106,247,.1),0 3px 10px rgba(0,0,0,.5)}}

#locBtn{position:absolute;bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 80px);right:12px;z-index:500;
  width:40px;height:40px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.4);transition:.15s}
#locBtn:hover{background:var(--border2)}
#locBtn.locating{border-color:var(--accent);box-shadow:0 0 14px rgba(124,106,247,.4)}

.lcard{background:var(--bg);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:.15s}
.lcard:hover{border-color:var(--border2);background:var(--surface2)}
.lbrand{width:42px;height:42px;border-radius:11px;border:1.5px solid var(--border2);
  background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lbrand img{width:38px;height:38px;object-fit:contain;border-radius:7px}

.leaflet-control-zoom{border:1px solid var(--border)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text)!important;border-bottom:1px solid var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--border2)!important}

@media(min-width:768px){
  .ov{align-items:center;justify-content:flex-end;padding:20px}
  .sh{max-width:400px;border-radius:18px;max-height:84vh;border:1px solid var(--border2)}
  .hdl{display:none}
  .leaflet-popup-content{width:285px!important}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>

<script>
(function(){
  var _t=0;
  setInterval(function(){
    var _s=new Date();
    debugger;
    if(new Date()-_s>100){document.title='⛽ ปั้มไหนมี';}
    _t++;
  },3000);
})();
</script>
</head>
<body>
<div id="wrap">

  <!-- ══ SPLASH LOADING SCREEN ══ -->
  <div id="splash">
    <div class="splash-logo">⛽</div>
    <div class="splash-title">ปั้มไหนมี</div>
    <div class="splash-sub">เขมราฐ · นาตาล · ตระการ · โพธิ์ไทร</div>
    <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
    <div class="splash-msg" id="splashMsg">กำลังโหลดข้อมูล...</div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <div id="top">
    <div class="logo-row">
      <div class="logo-icon">⛽</div>
      <div style="flex:1;min-width:0">
        <div class="logo-text">ปั้มไหนมี</div>
        <div class="logo-sub">เขมราฐ · นาตาล · ตระการ · โพธิ์ไทร</div>
      </div>
      <!-- แสดงเวลา sync ล่าสุด -->
      <div class="last-sync" id="lastSyncLabel">
        <div class="sync-dot loading" id="syncDot"></div>
        <span id="syncTime">กำลังโหลด...</span>
      </div>
    </div>
    <div id="pills">
      <button class="pl on" onclick="setF('ทั้งหมด')">ทั้งหมด</button>
      <button class="pl" onclick="setF('ดีเซล')">🚛 ดีเซล</button>
      <button class="pl" onclick="setF('เบนซิน 91')">🔵 91</button>
      <button class="pl" onclick="setF('เบนซิน 95')">🔴 95</button>
      <button class="pl" onclick="setF('E20')">🌿 E20</button>
    </div>
  </div>

  <div id="map"></div>
  <button id="locBtn" onclick="locateMe()">📍</button>

  <div id="sbar">
    <div class="sc"><div class="sn" style="color:var(--text)" id="st0">0</div><div class="sl">ปั๊มทั้งหมด</div></div>
    <div class="sc"><div class="sn" style="color:var(--green)" id="st1">0</div><div class="sl">มีน้ำมัน</div></div>
    <div class="sc"><div class="sn" style="color:var(--red)" id="st2">0</div><div class="sl">หมดแล้ว</div></div>
    <div class="sc"><div class="sn" style="color:var(--blue)" id="st3">0</div><div class="sl">วันนี้</div></div>
  </div>

  <div id="bnav">
    <button class="ni on" id="ni0" onclick="navTo('map')"><span>🗺️</span><p>แผนที่</p></button>
    <button class="ni" id="ni1" onclick="navTo('list')"><span>📋</span><p>รายการ</p></button>
    <button id="brep" onclick="openRep(null)">
      <div class="brep-i"><span style="font-size:15px">📢</span><span>รายงาน</span></div>
    </button>
    <button class="ni" onclick="openDonate()"><span>☕</span><p>สนับสนุน</p></button>
    <button class="ni" id="ni3" onclick="openAdm()"><span id="adico">🔐</span><p>แอดมิน</p></button>
  </div>
</div>

<div id="errBar"></div>
<div id="toast"></div>

<!-- DONATE SHEET -->
<div class="ov" id="ovDonate" onclick="closeOv('ovDonate')">
  <div class="sh" onclick="event.stopPropagation()">
    <div class="hdl"></div>
    <div class="sht">☕ สนับสนุนผู้พัฒนา</div>
    <div id="donateView"></div>
  </div>
</div>

<!-- REPORT SHEET -->
<div class="ov" id="ovRep" onclick="closeOv('ovRep')">
  <div class="sh" onclick="event.stopPropagation()">
    <div class="hdl"></div>
    <div id="repC"></div>
  </div>
</div>

<!-- LOGIN SHEET -->
<div class="ov" id="ovLog" onclick="closeOv('ovLog')">
  <div class="sh" onclick="event.stopPropagation()" style="max-height:52vh">
    <div class="hdl"></div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:10px">🔐</div>
      <div style="font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text)">ADMIN LOGIN</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">ใส่รหัสผ่านเพื่อเข้าสู่ระบบ</div>
    </div>
    <input class="inp" type="password" id="pw" placeholder="รหัสผ่าน" style="margin-bottom:10px"

async function adminSetFuel(stName, fuel, newStatus) {
 const ts = new Date().toISOString();
 const st = STATIONS.find(s => s.name === stName) || {};

 if (newStatus === 'none') {
 delete _sm[stName][fuel];
 _ap = _ap.filter(r => !(r.stationName === stName && r.fuelType === fuel));
 } else {
 const rec = {
 id: 'adm' + Date.now(),
 stationName: stName,
 district: st.district || '',
 fuelType: fuel,
 status: newStatus,
 note: '',
 reporter: 'แอดมิน',
 timestamp: ts,
 approvedAt: ts,
 };
 _ap = _ap.filter(r => !(r.stationName === stName && r.fuelType === fuel));
 _ap.unshift(rec);
 _sm[stName][fuel] = {status:newStatus, note:'', timestamp:ts, reporter:'แอดมิน'};
 }
 renderMap(); updateStats(); renderAdm();
 if (isReal()) {
 try {
 await apiPost({
 action: '\x61\x64\x6d\x69\x6e\x5f\x73\x65\x74\x5f\x73\x74\x61\x74\x75\x73',
 password: _apw,
 stationName: stName,
 district: st.district || '',
 fuelType: fuel,
 status: newStatus,
 timestamp: ts,
 });
 showToast(`${stName} · ${fuel} → ${newStatus === 'none' ? 'ล้างข้อมูล' : ST[newStatus].label}`);
 } catch(e) {
 showToast('บันทึกไม่สำเร็จ: ' + e.message, false);
 }
 } else {
 showToast(`${stName} · ${fuel} → ${newStatus === 'none' ? 'ล้างข้อมูล' : ST[newStatus].label}`);
 }
}

let _um = null, _uc = null;
function locateMe() {
 if (!navigator.geolocation) { showToast('เบราว์เซอร์ไม่รองรับ GPS', false); return; }
 const btn = document.getElementById('locBtn');
 btn.textContent = '⏳'; btn.classList.add('locating');
 navigator.geolocation.getCurrentPosition(pos => {
 const {latitude:lat, longitude:lng, accuracy} = pos.coords;
 btn.textContent = '📍'; btn.classList.remove('locating');
 if (_um) MAP.removeLayer(_um);
 if (_uc) MAP.removeLayer(_uc);
 _uc = L.circle([lat,lng], {radius:accuracy, color:'#7c6af7', fillColor:'#7c6af7', fillOpacity:.08, weight:1.5}).addTo(MAP);
 const dotIcon = L.divIcon({className:'', html:'<div class="user-dot"></div>', iconSize:[18,18], iconAnchor:[9,9]});
 _um = L.marker([lat,lng], {icon:dotIcon, zIndexOffset:1000}).addTo(MAP);
 _um.bindPopup(`<div style="font-family:'IBM Plex Sans Thai',sans-serif;padding:8px 4px;color:#0f172a">
 <b style="font-size:13px">📍 ตำแหน่งของคุณ</b>
 <div style="font-size:11px;color:#64748b;margin-top:2px">ความแม่นยำ ±${Math.round(accuracy)} เมตร</div>
 </div>`);
 MAP.flyTo([lat,lng], 14, {duration:1.2});
 showToast('พบตำแหน่งของคุณแล้ว');
 let nearest = null, minDist = Infinity;
 STATIONS.forEach(st => { const d = MAP.distance([lat,lng],[st.lat,st.lng]); if (d < minDist) { minDist = d; nearest = st; } });
 if (nearest && minDist < 30000)
 setTimeout(() => showToast(`ปั๊มใกล้สุด: ${nearest.name} (${(minDist/1000).toFixed(1)} กม.)`), 2500);
 }, err => {
 btn.textContent = '📍'; btn.classList.remove('locating');
 const msgs = {1:'ไม่อนุญาตให้เข้าถึง GPS', 2:'ไม่พบสัญญาณ GPS', 3:'หมดเวลา GPS'};
 showToast(msgs[err.code] || 'เกิดข้อผิดพลาด GPS', false);
 }, {enableHighAccuracy:true, timeout:12000, maximumAge:30000});
}
